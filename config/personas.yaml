# Persona catalog — who we're writing to, in their own words.
#
# Drives two things:
#   1. /people role targeting (services.<service_key> lists persona keys in
#      the SAME priority order as the legacy people.roles_by_service lists —
#      this file must stay behavior-identical to that list; see
#      tests/test_personas.py::test_target_roles_identical_to_legacy_path).
#   2. /outreach personalization — each persona's pains/language is attached
#      to a contact's message packet (see messages.py::prepare) so the
#      copywriter subagent has role-specific raw material, not just a title.
#
# Pains/language below are lifted from config/outbound_copywriter.md's
# Signal -> Pain -> Fix table and Business Context section (2026-07-07) —
# reused, not invented. Keep both files in sync if the framework's pain
# language changes.
#
# committee_role is informational context for the copywriter (economic buyer
# vs champion vs technical evaluator) — never changes scoring or QA.

ceo:
  role_bucket: CEO
  titles: [CEO, Chief Executive Officer, President & CEO, President and CEO, Founder & CEO, Founder and CEO]
  seniority: c-suite
  committee_role: economic buyer
  pains:
    - Investors ask about AI on every call and nobody inside owns the answer.
    - The board expects the raise to turn into growth, and hiring reps the old way eats it as ramp time and payroll before pipeline moves.
    - The AI promise is public but execution is unstaffed, and the gap between the announcement and the product widens every quarter.
  language:
    their_words: [board, investors, the raise, headcount, runway, own it]
    avoid: [AI-powered platform, game-changing, thought leader, synergy]

cfo:
  role_bucket: CFO
  titles: [CFO, Chief Financial Officer, VP Finance, VP of Finance]
  seniority: c-suite
  committee_role: budget gatekeeper
  pains:
    - The board expects the raise to turn into growth, and hiring reps the old way eats it as ramp time and payroll before pipeline moves.
    - More budget keeps going into the same manual motion and it isn't bending the growth curve.
    - GTM still runs manually — no internal AI owner to turn ambition into execution.
  language:
    their_words: [payroll, headcount, burn, runway, cost per meeting, budget]
    avoid: [AI-powered platform, game-changing, revolutionary, best-in-class]

coo:
  role_bucket: COO
  titles: [COO, Chief Operating Officer]
  seniority: c-suite
  committee_role: operational buyer
  pains:
    - Inherited manual operations plus pressure for early wins, with no time to build a team before delivering one.
    - GTM still runs manually — no internal AI owner to turn ambition into execution.
    - More budget keeps going into the same manual motion and it isn't bending the growth curve.
  language:
    their_words: [headcount, ramp time, manual process, ownership, execution]
    avoid: [streamline, optimize, synergy, cutting-edge]


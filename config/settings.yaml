# Pipeline configuration — every knob the funnel uses lives here.

universe:
  exchanges: [NYSE, Nasdaq, NYSE American]   # OTC excluded by default
  market_cap_min: 50_000_000                  # micro-cap band (USD)
  market_cap_max: 300_000_000                 # widen here when you want small-caps too
  # Sector buckets. A company matches a bucket if its SIC is in `sic`, or its
  # SIC is in `generic_tech_sic` AND name/description matches a keyword.
  generic_tech_sic: ["7372", "7371", "7370", "7389"]
  # Shells that carry an operating SIC still slip through — catch them by name.
  exclude_name_patterns: [acquisition corp, acquisition co, merger corp, blank check]
  sectors:
    saas:
      sic: ["7372", "7371", "7370"]
      keywords: [software, saas, platform, cloud, application]
      # generic_keyword_match: false -> this sector only claims a generic_tech_sic
      # code via its explicit `sic` list, never via keywords (default: true)
      generic_keyword_match: false
    fintech:
      # 6770 (blank checks) excluded 2026-07-05: SPAC shells, not operating fintechs
      sic: ["6199", "6141", "6153", "6159", "6162", "6172", "6282", "6099", "6022"]
      keywords: [payment, fintech, lending, banking, insurtech, insurance technology, wealth, trading platform, financial software]
    healthcare:
      sic: ["8000", "8011", "8049", "8050", "8060", "8071", "8082", "8090", "8093", "3841", "3845", "5047"]
      keywords: [health, medical, telehealth, care, clinical, patient, diagnostic]
      exclude_sic: ["2834", "2836", "8731"]   # pure pharma/biotech R&D out by default
    edtech:
      sic: ["8200", "8221", "8249", "8299"]
      keywords: [education, learning, edtech, training, tutoring, courseware]

# L1 pre-screen (v3): cheap exclusions applied before EDGAR/Parallel spend, run
# by both `ingest` (single companies) and `discover` (bulk, inside
# universe.screen). Defaults are inert for discover (exchange/cap band already
# match the universe.* filters); for ingest, otc_only_exclude is the one
# default with teeth since ingest otherwise has no exchange filter at all.
prescreen:
  exclude_tickers: []       # customers/competitors — never re-enter regardless of the screen
  exclude_sic: []            # SIC codes to hard-exclude even if a sector otherwise matches
  exchange_allowlist: []     # empty -> falls back to universe.exchanges
  otc_only_exclude: true     # exclude tickers with no/blank/OTC-flagged exchange
  shell_name_patterns: []    # e.g. [acquisition corp, blank check, spac]
  # cap band reuses universe.market_cap_min/market_cap_max unless overridden here

enrich:
  edgar:
    years_back: 2            # compare latest vs prior annual report for AI-mention delta
    eightk_lookback_days: 365
    ipo_lookback_days: 730
  parallel:
    processor: base          # Parallel Task API processor tier (cost control)
    max_tasks_per_run: 25    # hard cap on Parallel task runs per enrich invocation
    poll_timeout_seconds: 600
  deep:
    max_tasks_per_run: 15    # deep Parallel tasks per run (score-gated tier)
    processor: base
    poll_timeout_seconds: 900

scoring:
  qualify_threshold: 65      # total >= this AND >=1 hard signal -> qualified
  disqualify_below: 45      # total < this -> disqualified; between = stays 'scored' for review
  require_angle: true        # qualified needs >=1 active outreach angle (v2 gate); false = v1 behavior
  hard_signals: [E1, E3, E4, E5, P1, P2, P3]
  # Deterministic pre-gate: skip LLM scoring when the verdict cannot change the
  # qualify outcome — no hard signal present, or base_total + max_llm_lift
  # below qualify_threshold. Gated companies commit a synthetic deterministic
  # verdict (total = capped base components, no stacking). max_llm_lift 40
  # keeps every qualifier in the 244 archived verdicts (min qualifying base
  # 26.2 -> gate cutoff base < 25); on that history it skips ~51% of LLM runs.
  # Re-audited 2026-07-10 on 260 archived runs: lift 40 gates 48% and loses
  # ZERO eventual qualifiers (max observed lift 43.2; only 3 lifts exceeded 40
  # and all had base high enough to stay ungated). Known trade-off class:
  # LFMD-style review-band placements (base ~21, LLM 62) are gated and only
  # recoverable via deep enrichment + rescore. E8 now feeding capability_gap
  # un-gates ~19 gap-driven companies on that history.
  pre_gate:
    enabled: true
    max_llm_lift: 40
  # Median-of-3 band: a verdict total within +/- this of qualify_threshold is
  # borderline — score 3 independent replicates and commit the median; never
  # re-roll to pass. Enforced by `score --commit` itself: borderline single-shot
  # verdicts are held until .run1/.run2/.run3 replicate results exist, then
  # commit settles on the median. 0 disables the hold (tests only).
  median_band: 8
  # Dated event signals (E3/E4/E7/P3) keep full weight for `full_days`, then
  # decay linearly to `floor` x weight at their collection-window edge.
  recency:
    full_days: 90
    floor: 0.25
  # One recency story (2026-07-10): the decay math above is the single source;
  # each packet carries timing_ceiling = round(decayed base timing) + this
  # headroom, and `score --commit` clamps the LLM's timing component to it
  # (replaces the old rubric-only ">180 days -> timing <=8" rule). On the 260
  # archived runs a +8 headroom would have caught pure-invention timing (TALK:
  # base 0 -> LLM 22) while pushing only 4 borderline runs into the
  # median-of-3 band.
  timing_ceiling_headroom: 8
  # Deterministic base weights per signal type (component caps applied in code)
  weights:
    E1: 15   # new/rising AI language in strategy sections
    E2: 6    # AI only in risk factors (aware, defensive)
    E3: 10   # new C-level exec <=12mo
    E4: 8    # restructuring / cost program
    E5: 8    # S&M spend rising while growth slows
    E6: 8    # no tech leadership disclosed
    E7: 8    # recent IPO <=24mo
    E8: 6    # sector peer laggard (derived at scoring time; feeds capability_gap since 2026-07-10)
    E9: 4    # cash capacity to buy services
    P1: 10   # AI job postings (adopter marker)
    P2: 8    # SDR/BDR/marketing hiring
    P3: 10   # public AI announcements/pilots
    P4: 6    # product AI gap vs peers
    P5: 4    # martech stack maturity
    P6: 6    # exec AI commentary
  component_caps:
    intent: 30           # E1 E2 P3 P6
    capability_gap: 25   # E6 P4 E8 + absence-of-execution logic
    timing: 25           # E3 E4 E7
    commercial_fit: 20   # E5 E9 P1 P2 P5 + sector/band fit
  # v3: bonus applied to the deterministic BASE score only (never the LLM
  # verdict) when a company's evidence spans >= min_components distinct
  # scoring components (intent/capability_gap/timing/commercial_fit) — stacked
  # signals are a stronger buying signal than the same weight in one bucket.
  stacking:
    min_components: 3
    bonus: 5
  # v3: SLA/urgency bucket riding on each packet signal (informational context
  # for the scorer only — never changes the deterministic math). Buckets are
  # by signal age_days; a signal with no observed_at gets urgency: null.
  urgency:
    windows:
      hot: 30    # age_days <= this -> "hot"
      warm: 90   # <= this -> "warm"; older -> "cold"
  # v3: composite ordering key for /people and messages --prepare, computed at
  # commit from verdict total + base stacking bonus + strongest fresh angle.
  # priority = total*total_weight + stacking_bonus*stacking_weight +
  #            max_angle_strength*angle_strength_weight
  priority:
    total_weight: 1.0
    stacking_weight: 1.0
    angle_strength_weight: 10.0
  # v3: T1 requires total >= t1_min AND qualified; T2 = qualified below it;
  # T3 = review band; T4 = disqualified. Computed at commit, never an LLM output.
  tiers:
    t1_min: 80

angles:
  # outreach-angle freshness windows: event older than this -> stale, never
  # satisfies the qualify gate, never ranks as primary
  freshness_days:
    funding: 365
    leadership: 365
    ai_move: 270
  # strength = recency decay x evidence quality (angles.py)
  strength:
    full_days: 90
    floor: 0.25

people:
  max_companies_per_run: 10
  always_include_roles: [CEO]
  roles_by_service:
    ai_lead_generation: [CMO, VP Marketing, CRO, VP Sales, Head of Growth]
    ai_outreach: [CRO, VP Sales, Head of Sales Development, CMO]
    ai_marketing: [CMO, VP Marketing, Head of Digital]
    custom_ai_agents: [CTO, CIO, COO, VP Engineering]
    ai_consultation: [CEO, CFO, COO]

messages:
  max_per_run: 40              # contact-level packet cap per prepare
  packets_per_subagent: 3      # /outreach batch size (prose needs smaller batches than scoring)
  day_offsets: [0, 3, 8, 16]   # stamped by commit(); whatever the LLM wrote is ignored
  # case_study / benchmark stay off until martechs.io has citable proof points
  allowed_archetypes: [observation, creative_ideas, referral_ceiling, problem_solution, whole_offer]
  word_count:
    step1_min: 60
    step1_max: 120
    hard_max: 150              # any body above this fails QA outright
  you_we_ratio_min: 2.0        # prospect-focused vs self-focused language (warning)
  banned_words_extra: []       # appended to banned_words below
  framework_file: outbound_copywriter.md   # relative to config/; embedded in _shared.json
  # Canonical banned-word list (v3): messages.py's _DEFAULT_BANNED_WORDS is a
  # fallback for packs without this key — the two must read the same either
  # way. ALSO see config/outbound_copywriter.md's "Voice" section (human-facing
  # copy of the same list) — change all three together.
  banned_words:
    - leverage
    - utilize
    - streamline
    - comprehensive
    - robust
    - innovative
    - cutting-edge
    - game-changing
    - revolutionary
    - disruptive
    - synergy
    - best-in-class
    - world-class
    - next-generation
    - solution
    - excited to
    - passionate about
    - thrilled
    - reimagine
    - transform
    - empower
    - elevate
    - optimize
    - drive results
    - thought leader
  # v3: minimum step-1 personalization score (0-5, see messages._personalization_score)
  # before qa_check appends a "personalization N/5" warning. Never a hard fail.
  personalization_min: 3

# v3 phase 4: outcome analytics (pipeline analytics.py / `pipeline status
# --analytics`). Benchmarks are informational callouts only — they never
# gate anything (unlike scoring.qualify_threshold).
analytics:
  # cold-email positive-reply-rate bands (north star metric) — see
  # analytics.benchmark_band(). Values are fractions of sends (0.03 = 3%).
  benchmarks:
    positive_reply_rate:
      poor: 0.01
      avg: 0.03
      good: 0.08
  # a funnel/attribution section with fewer sends than this prints
  # "insufficient data (<N sent)" instead of a rate — small samples lie.
  min_sends_for_attribution: 10
  # `pipeline calibrate` (outcome -> signal-weight report) uses a higher bar:
  # weight advice from thin samples is worse than none. Report-only — it
  # never edits scoring.weights; that stays a human decision.
  min_sends_for_calibration: 25
